<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prognosemärkte</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c0e;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

header{border-bottom:1px solid rgba(255,255,255,.07);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(12,12,14,.95);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Fraunces',serif;font-size:19px;font-weight:700}
.sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);margin-left:10px}
.hright{display:flex;align-items:center;gap:12px}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.dot.ld{background:#facc15;animation:pulse 1s infinite}
.dot.er{background:#f87171}
.st{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.35)}
.rb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.6);padding:5px 12px;font-size:13px;cursor:pointer}
.rb:disabled{opacity:.4;cursor:not-allowed}

#tw{background:rgba(250,204,21,.05);border-top:1px solid rgba(250,204,21,.12);border-bottom:1px solid rgba(250,204,21,.12);padding:7px 0;overflow:hidden;display:none}
#ti{display:inline-block;white-space:nowrap;animation:ticker 90s linear infinite;font-family:'DM Mono',monospace;font-size:11px;color:rgba(250,204,21,.65);padding-left:100%}

main{max-width:1240px;margin:0 auto;padding:24px 20px 60px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:0}
.tab{padding:8px 18px;font-size:13px;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.on{color:#fff;border-bottom-color:#facc15}

/* Controls */
.ctrl{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.cats{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.cat{padding:4px 13px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;transition:all .15s}
.cat.on{border-color:rgba(250,204,21,.5);background:rgba(250,204,21,.08);color:#facc15}
.srch{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;width:170px;outline:none}
.srch::placeholder{color:rgba(255,255,255,.22)}

/* Stats bar */
.statsbar{display:flex;gap:20px;margin-bottom:20px;padding:12px 16px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(255,255,255,.05);flex-wrap:wrap}
.sv{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;margin-right:6px}
.sl{font-size:11px;color:rgba(255,255,255,.32);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}

/* Section headers */
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;margin-top:28px}
.section-head:first-child{margin-top:0}
.section-icon{font-size:15px}
.section-title{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5)}
.section-count{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);background:rgba(255,255,255,.06);padding:1px 7px;border-radius:10px}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:8px}

/* Cards */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:12px;animation:fadeUp .35s ease both;transition:border-color .2s,background .2s;position:relative}
.card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.13)}
.card.mover-up{border-left:2px solid #4ade80}
.card.mover-dn{border-left:2px solid #f87171}
.card.coinflip{border-left:2px solid #facc15}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.cq{font-family:'Fraunces',serif;font-size:13px;line-height:1.45;color:rgba(255,255,255,.88);font-weight:500;flex:1}
.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.cvol{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.28)}
.cbadge{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px}
.cbadge.up{background:rgba(74,222,128,.12);color:#4ade80}
.cbadge.dn{background:rgba(248,113,113,.12);color:#f87171}
.cbadge.flip{background:rgba(250,204,21,.12);color:#facc15}
.olabel{font-size:10px;color:rgba(255,255,255,.38);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.prow{display:flex;align-items:center;gap:8px}
.ptrack{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.ppct{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;min-width:34px;text-align:right}
.news-btn{margin-top:2px;display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);cursor:pointer;text-decoration:none;transition:color .15s;border:none;background:none;padding:0}
.news-btn:hover{color:rgba(255,255,255,.7)}

/* Skeletons */
.skel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:12px;height:115px;animation:pulse 1.5s ease infinite}
.errbox{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:10px;padding:16px;color:#f87171;font-family:'DM Mono',monospace;font-size:12px}
.empty{text-align:center;padding:60px 0;color:rgba(255,255,255,.2);font-family:'Fraunces',serif;font-size:16px;font-style:italic}

footer{border-top:1px solid rgba(255,255,255,.05);padding:14px 24px;display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.16)}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:baseline">
    <span class="logo">Prognosemärkte</span>
    <span class="sub">via Polymarket</span>
  </div>
  <div class="hright">
    <div style="display:flex;align-items:center;gap:5px">
      <div class="dot ld" id="dot"></div>
      <span class="st" id="st">Lädt…</span>
    </div>
    <button class="rb" id="rb" onclick="go()">↻</button>
  </div>
</header>

<div id="tw"><div id="ti"></div></div>

<main>
  <div class="tabs">
    <div class="tab on" onclick="setTab('all',this)">Alle</div>
    <div class="tab" onclick="setTab('movers',this)">🔥 Movers</div>
    <div class="tab" onclick="setTab('coinflip',this)">⚖️ Coin Flip</div>
  </div>

  <div class="ctrl">
    <div class="cats" id="cats"></div>
    <input class="srch" type="text" placeholder="Suchen…" id="sq" oninput="render()">
  </div>

  <div class="statsbar" id="statsbar" style="display:none">
    <div><span class="sv" id="nm">-</span><span class="sl">Märkte</span></div>
    <div><span class="sv" id="ne">-</span><span class="sl">Events</span></div>
    <div><span class="sv" id="nv">-</span><span class="sl">Volumen</span></div>
    <div><span class="sv" id="nm2">-</span><span class="sl">Movers</span></div>
    <div><span class="sv" id="nf">-</span><span class="sl">Coin Flips</span></div>
  </div>

  <div id="ct"></div>
</main>

<footer>
  <span>Nur zur Anzeige — kein Handel möglich · Daten: Polymarket Gamma API</span>
  <span>Auto-refresh 3 min</span>
</footer>

<script>
var PX = "https://pdwcnxuqzcvwufeqqatu.supabase.co/functions/v1/polymarket-proxy";
var CATS = [
  {id:"all",l:"Alle"},{id:"politics",l:"Politik"},{id:"crypto",l:"Crypto"},
  {id:"sports",l:"Sport"},{id:"economics",l:"Wirtschaft"},{id:"science",l:"Wissenschaft"}
];
var M=[],E=[],cur="all",tab="all";

// Category buttons
var ce=document.getElementById("cats");
CATS.forEach(function(c){
  var b=document.createElement("button");
  b.className="cat"+(c.id==="all"?" on":"");
  b.textContent=c.l;
  b.onclick=function(){
    cur=c.id;
    document.querySelectorAll(".cat").forEach(function(x){x.classList.remove("on");});
    b.classList.add("on");
    go();
  };
  ce.appendChild(b);
});

function setTab(t,el){
  tab=t;
  document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});
  el.classList.add("on");
  render();
}

function fmt(v){return v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1000?"$"+(v/1000).toFixed(0)+"K":"$"+v.toFixed(0);}
function jp(v){if(!v)return[];try{return typeof v==="string"?JSON.parse(v):v;}catch(e){return[];}}

function isMover(m){
  var c=parseFloat(m.price24hrChange||m.priceChange||0);
  return Math.abs(c)>=0.05;
}
function isCoinFlip(m){
  var p=parseFloat((jp(m.outcomePrices))[0])||0.5;
  return p>=0.38&&p<=0.62;
}
function getChange(m){
  return parseFloat(m.price24hrChange||m.priceChange||0);
}

async function pf(path,p){
  var u=new URL(PX);
  u.searchParams.set("path",path);
  Object.keys(p||{}).forEach(function(k){u.searchParams.set(k,p[k]);});
  var r=await fetch(u.toString());
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}

async function go(){
  var dot=document.getElementById("dot"),st=document.getElementById("st"),rb=document.getElementById("rb");
  dot.className="dot ld"; st.textContent="Lädt…"; rb.disabled=true;
  skels();
  try{
    var p={closed:"false",limit:"100",order:"volume24hr",ascending:"false"};
    if(cur!=="all")p.tag=cur;
    var r=await Promise.all([pf("events",p),pf("markets",Object.assign({},p,{active:"true"}))]);
    E=Array.isArray(r[0])?r[0]:[];
    M=Array.isArray(r[1])?r[1]:[];
    var now=new Date().toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});
    dot.className="dot"; st.textContent="Aktualisiert "+now;
    tick(); render();
  }catch(e){
    dot.className="dot er"; st.textContent="Fehler";
    document.getElementById("ct").innerHTML="<div class='errbox'>⚠ "+e.message+"</div>";
    document.getElementById("statsbar").style.display="none";
  }finally{rb.disabled=false;}
}

function tick(){
  var w=document.getElementById("tw"),i=document.getElementById("ti");
  if(!E.length){w.style.display="none";return;}
  var t=E.slice(0,15).map(function(e){
    var m=e.markets&&e.markets[0];
    var pr=jp(m&&m.outcomePrices);
    var pct=Math.round((parseFloat(pr[0])||.5)*100);
    return e.title+" — "+pct+"%";
  }).join("   ·   ");
  i.textContent=t+"   ·   "+t;
  w.style.display="block";
}

function makeCard(m,i,badgeType){
  var oc=jp(m.outcomes); var pr=jp(m.outcomePrices);
  var vol=parseFloat(m.volume)||0;
  var tp=parseFloat(pr[0])||.5; var pct=Math.round(tp*100);
  var bc=pct>=60?"#4ade80":pct<=40?"#f87171":"#facc15";
  var change=getChange(m);
  var changePct=Math.round(Math.abs(change)*100);

  var card=document.createElement("div");
  var cls="card";
  if(badgeType==="up")cls+=" mover-up";
  else if(badgeType==="dn")cls+=" mover-dn";
  else if(badgeType==="flip")cls+=" coinflip";
  card.className=cls;
  card.style.animationDelay=(i*20)+"ms";

  var badgeHtml="";
  if(badgeType==="up")badgeHtml="<span class='cbadge up'>↑ +"+changePct+"%</span>";
  else if(badgeType==="dn")badgeHtml="<span class='cbadge dn'>↓ -"+changePct+"%</span>";
  else if(badgeType==="flip")badgeHtml="<span class='cbadge flip'>~50/50</span>";

  var outs=oc.length?oc.slice(0,2):["Ja","Nein"];
  var oh="";
  for(var j=0;j<outs.length;j++){
    var pp=Math.round((parseFloat(pr[j])||0)*100);
    var col=j===0?bc:"rgba(255,255,255,0.25)";
    oh+="<div><div class='olabel'>"+outs[j]+"</div>";
    oh+="<div class='prow'><div class='ptrack'><div class='pfill' style='width:"+pp+"%;background:"+col+"'></div></div>";
    oh+="<span class='ppct' style='color:"+col+"'>"+pp+"%</span></div></div>";
  }

  var q=encodeURIComponent((m.question||"").replace(/\?/g,""));
  var newsUrl="https://news.google.com/search?q="+q+"&hl=de";

  card.innerHTML=
    "<div class='ctop'>"+
      "<div class='cq'>"+(m.question||"")+"</div>"+
      "<div class='cmeta'><span class='cvol'>"+fmt(vol)+"</span>"+badgeHtml+"</div>"+
    "</div>"+
    "<div style='display:flex;flex-direction:column;gap:7px'>"+oh+"</div>"+
    "<a class='news-btn' href='"+newsUrl+"' target='_blank' rel='noopener'>"+
      "<svg width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6'/><polyline points='15 3 21 3 21 9'/><line x1='10' y1='14' x2='21' y2='3'/></svg>"+
      "News dazu"+
    "</a>";

  return card;
}

function render(){
  var q=document.getElementById("sq").value.toLowerCase();
  var f=M.filter(function(m){return !q||(m.question&&m.question.toLowerCase().indexOf(q)>=0);});

  var movers=f.filter(function(m){return isMover(m);}).sort(function(a,b){return Math.abs(getChange(b))-Math.abs(getChange(a));});
  var flips=f.filter(function(m){return isCoinFlip(m);});

  // Stats
  var sb=document.getElementById("statsbar");
  if(f.length){
    var tot=f.reduce(function(a,m){return a+(parseFloat(m.volume)||0);},0);
    document.getElementById("nm").textContent=f.length;
    document.getElementById("ne").textContent=E.length;
    document.getElementById("nv").textContent=fmt(tot);
    document.getElementById("nm2").textContent=movers.length;
    document.getElementById("nf").textContent=flips.length;
    sb.style.display="flex";
  }else{sb.style.display="none";}

  var ct=document.getElementById("ct");
  ct.innerHTML="";

  if(!f.length){
    ct.innerHTML="<div class='empty'>Keine Märkte gefunden.</div>";
    return;
  }

  if(tab==="movers"){
    renderSection(ct, movers, "🔥", "Bewegt sich gerade", "up");
  } else if(tab==="coinflip"){
    renderSection(ct, flips, "⚖️", "Offen — niemand weiss es", "flip");
  } else {
    // All tab: show movers section first, then coinflips, then rest
    if(movers.length){
      renderSection(ct, movers.slice(0,6), "🔥", "Grösste Bewegungen 24h", null);
    }
    if(flips.length){
      renderSection(ct, flips.slice(0,6), "⚖️", "Coin Flip — offen", null);
    }
    renderSection(ct, f.slice(0,30), "📊", "Alle nach Volumen", null);
  }
}

function renderSection(ct, items, icon, title, forceType){
  if(!items.length)return;
  var head=document.createElement("div");
  head.className="section-head";
  head.innerHTML="<span class='section-icon'>"+icon+"</span><span class='section-title'>"+title+"</span><span class='section-count'>"+items.length+"</span>";
  ct.appendChild(head);
  var g=document.createElement("div");
  g.className="grid";
  items.forEach(function(m,i){
    var bt=forceType;
    if(!bt){
      var ch=getChange(m);
      if(isMover(m))bt=ch>0?"up":"dn";
      else if(isCoinFlip(m))bt="flip";
    }
    g.appendChild(makeCard(m,i,bt));
  });
  ct.appendChild(g);
}

function skels(){
  document.getElementById("statsbar").style.display="none";
  var g=document.createElement("div"); g.className="grid";
  for(var i=0;i<9;i++){var s=document.createElement("div");s.className="skel";s.style.animationDelay=(i*60)+"ms";g.appendChild(s);}
  document.getElementById("ct").innerHTML="";
  document.getElementById("ct").appendChild(g);
}

go(); setInterval(go,180000);
</script>
</body>
</html>
